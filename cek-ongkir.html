<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CEK ONGKIR - SAHABATKU DELIVERY</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
          colors: { sahabatku: '#0080f7', darkBg: '#0f172a' },
          borderRadius: { '2xl': '24px' }
        }
      }
    }
  </script>

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass-card {
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.25);
    }
    .dark .glass-card {
      background: rgba(30,41,59,.7);
      border: 1px solid rgba(255,255,255,.05);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen dark:bg-darkBg dark:text-slate-100 pb-20">
  <div class="max-w-md mx-auto min-h-screen bg-slate-50/60 dark:bg-darkBg border-x border-slate-100 dark:border-slate-800 overflow-hidden">

    <!-- HEADER -->
    <header class="sticky top-0 z-50 glass-card px-5 py-4 flex items-center justify-between border-b border-slate-100 dark:border-slate-800">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-2xl overflow-hidden bg-white shadow-lg ring-2 ring-white/20">
          <img src="https://uploads.onecompiler.io/43v32m6x5/44rw83fkz/Sahabatku%20(2).png" class="w-full h-full object-cover" alt="Logo">
        </div>
        <div>
          <h1 class="text-sm font-bold tracking-tight text-sahabatku">Cek Ongkir</h1>
          <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">Sahabatku Delivery</p>
          <a href="index.html" class="inline-flex mt-0.5 text-[10px] font-bold text-sahabatku hover:underline">← Kembali</a>
        </div>
      </div>
      <button id="themeToggle" class="w-9 h-9 rounded-xl flex items-center justify-center text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">
        <i class="fa-solid fa-moon dark:hidden"></i>
        <i class="fa-solid fa-sun hidden dark:block"></i>
      </button>
    </header>

    <!-- MAIN CONTENT -->
    <main class="p-4 space-y-4 pb-24">

      <!-- TAB SELECTOR -->
      <div class="grid grid-cols-3 gap-2 bg-slate-100 dark:bg-slate-800 rounded-2xl p-1">
        <button onclick="switchTab('normal')" id="tab-normal" class="py-3 rounded-xl font-bold text-[10px] uppercase bg-white dark:bg-darkBg text-sahabatku shadow-sm transition-all">
          <i class="fa-solid fa-road mr-1"></i> Cek Ongkir
        </button>
        <button onclick="switchTab('jarak')" id="tab-jarak" class="py-2 rounded-xl font-bold text-[10px] uppercase text-slate-500 dark:text-slate-400 transition-all">
          <i class="fa-solid fa-ruler mr-1"></i> Hitung Jarak
        </button>
        <button onclick="switchTab('3arah')" id="tab-3arah" class="py-2 rounded-xl font-bold text-[10px] uppercase text-slate-500 dark:text-slate-400 transition-all">
          <i class="fa-solid fa-route mr-1"></i> 3 Arah
        </button>
      </div>

      <!-- CEK ONGKIR NORMAL -->
      <section id="section-normal" class="space-y-4">
        <div class="glass-card p-4 rounded-2xl space-y-3">
          <h2 class="font-bold text-sm text-sahabatku flex items-center gap-2">
            <i class="fa-solid fa-magnifying-glass"></i> Cek Ongkir Standar
          </h2>

          <div>
            <label class="block text-xs font-semibold mb-1.5">Asal Wilayah</label>
            <div class="relative">
              <input type="text" id="normal-asal" placeholder="Ketik asal wilayah..." 
                oninput="updateSuggestions('normal','asal')"
                class="w-full px-4 py-3 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-sahabatku">
              <div id="suggest-normal-asal" class="hidden absolute left-0 right-0 top-full mt-1 bg-white dark:bg-slate-800 border rounded-2xl shadow-lg max-h-40 overflow-y-auto z-20"></div>
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold mb-1.5">Tujuan Wilayah</label>
            <div class="relative">
              <input type="text" id="normal-tujuan" placeholder="Ketik tujuan wilayah..." 
                oninput="updateSuggestions('normal','tujuan')"
                class="w-full px-4 py-3 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-sahabatku">
              <div id="suggest-normal-tujuan" class="hidden absolute left-0 right-0 top-full mt-1 bg-white dark:bg-slate-800 border rounded-2xl shadow-lg max-h-40 overflow-y-auto z-20"></div>
            </div>
          </div>

          <button onclick="hitungNormal()" class="w-full py-3 bg-gradient-to-r from-sahabatku to-blue-600 text-white font-bold rounded-2xl shadow-lg hover:shadow-xl transition-all active:scale-95">
            <i class="fa-solid fa-calculator mr-2"></i> Hitung Ongkir
          </button>

          <div id="result-normal" class="hidden p-4 rounded-2xl bg-emerald-50 dark:bg-emerald-950/30 border border-emerald-200 dark:border-emerald-800">
            <div class="text-xs text-emerald-600 dark:text-emerald-300 uppercase font-bold">Hasil Estimasi</div>
            <div class="text-3xl font-black text-emerald-700 dark:text-emerald-200 mt-2" id="display-normal">Rp 0</div>
          </div>
        </div>
      </section>

      <!-- HITUNG JARAK -->
      <section id="section-jarak" class="hidden space-y-4">
        <div class="glass-card p-4 rounded-2xl space-y-3">
          <h2 class="font-bold text-sm text-sahabatku flex items-center gap-2">
            <i class="fa-solid fa-map-location-dot"></i> Hitung Berdasarkan Jarak
          </h2>

          <div>
            <label class="block text-xs font-semibold mb-1.5">Wilayah / Asal</label>
            <div class="relative">
              <input type="text" id="jarak-wilayah" placeholder="Ketik wilayah asal..." 
                oninput="updateSuggestions('jarak','wilayah')"
                class="w-full px-4 py-3 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-sahabatku">
              <div id="suggest-jarak-wilayah" class="hidden absolute left-0 right-0 top-full mt-1 bg-white dark:bg-slate-800 border rounded-2xl shadow-lg max-h-40 overflow-y-auto z-20"></div>
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold mb-1.5">Jarak (KM)</label>
            <input type="number" id="jarak-km" placeholder="Contoh: 13" step="0.5" min="0"
              class="w-full px-4 py-3 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-sahabatku">
          </div>

          <div class="p-3 rounded-2xl bg-blue-50 dark:bg-blue-950/30 border border-blue-200 dark:border-blue-800 text-[10px] text-blue-700 dark:text-blue-300">
            <i class="fa-solid fa-info-circle mr-1"></i> Rumus: (Jarak × 2 × 1.000) + 2.000 + Tarif Base
          </div>

          <button onclick="hitungJarak()" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-indigo-600 text-white font-bold rounded-2xl shadow-lg hover:shadow-xl transition-all active:scale-95">
            <i class="fa-solid fa-calculator mr-2"></i> Hitung Jarak
          </button>

          <div id="result-jarak" class="hidden p-4 rounded-2xl bg-indigo-50 dark:bg-indigo-950/30 border border-indigo-200 dark:border-indigo-800">
            <div class="text-xs text-indigo-600 dark:text-indigo-300 uppercase font-bold">Hasil Hitung Jarak</div>
            <div class="text-3xl font-black text-indigo-700 dark:text-indigo-200 mt-2" id="display-jarak">Rp 0</div>
          </div>
        </div>
      </section>

      <!-- 3 ARAH -->
      <section id="section-3arah" class="hidden space-y-4">
        <div class="glass-card p-4 rounded-2xl space-y-3">
          <h2 class="font-bold text-sm text-sahabatku flex items-center gap-2">
            <i class="fa-solid fa-route"></i> Cek Ongkir 3 Arah
          </h2>

          <div>
            <label class="block text-xs font-semibold mb-1.5">Asal</label>
            <div class="relative">
              <input type="text" id="3arah-asal" placeholder="Ketik asal..." 
                oninput="updateSuggestions('3arah','asal')"
                class="w-full px-4 py-3 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-sahabatku">
              <div id="suggest-3arah-asal" class="hidden absolute left-0 right-0 top-full mt-1 bg-white dark:bg-slate-800 border rounded-2xl shadow-lg max-h-40 overflow-y-auto z-20"></div>
            </div>
          </div>

          <div class="relative">
            <div class="flex items-center justify-center h-8">
              <div class="flex-1 h-0.5 bg-slate-300 dark:bg-slate-700"></div>
              <i class="fa-solid fa-arrow-down text-slate-400 mx-2"></i>
              <div class="flex-1 h-0.5 bg-slate-300 dark:bg-slate-700"></div>
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold mb-1.5">Titik Tengah (Checkpoint)</label>
            <div class="relative">
              <input type="text" id="3arah-titik" placeholder="Ketik titik tengah..." 
                oninput="updateSuggestions('3arah','titik')"
                class="w-full px-4 py-3 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-sahabatku">
              <div id="suggest-3arah-titik" class="hidden absolute left-0 right-0 top-full mt-1 bg-white dark:bg-slate-800 border rounded-2xl shadow-lg max-h-40 overflow-y-auto z-20"></div>
            </div>
          </div>

          <div class="relative">
            <div class="flex items-center justify-center h-8">
              <div class="flex-1 h-0.5 bg-slate-300 dark:bg-slate-700"></div>
              <i class="fa-solid fa-arrow-down text-slate-400 mx-2"></i>
              <div class="flex-1 h-0.5 bg-slate-300 dark:bg-slate-700"></div>
            </div>
          </div>

          <div>
            <label class="block text-xs font-semibold mb-1.5">Tujuan Akhir</label>
            <div class="relative">
              <input type="text" id="3arah-tujuan" placeholder="Ketik tujuan akhir..." 
                oninput="updateSuggestions('3arah','tujuan')"
                class="w-full px-4 py-3 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-sahabatku">
              <div id="suggest-3arah-tujuan" class="hidden absolute left-0 right-0 top-full mt-1 bg-white dark:bg-slate-800 border rounded-2xl shadow-lg max-h-40 overflow-y-auto z-20"></div>
            </div>
          </div>

          <button onclick="hitung3Arah()" class="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white font-bold rounded-2xl shadow-lg hover:shadow-xl transition-all active:scale-95">
            <i class="fa-solid fa-calculator mr-2"></i> Hitung 3 Arah
          </button>

          <div id="result-3arah" class="hidden p-4 rounded-2xl bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-800">
            <div class="text-xs text-amber-600 dark:text-amber-300 uppercase font-bold">Hasil Estimasi 3 Arah</div>
            <div class="text-3xl font-black text-amber-700 dark:text-amber-200 mt-2" id="display-3arah">Rp 0</div>
          </div>
        </div>
      </section>

    </main>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDweL8xXcOu6ZODYzCa1KpqZVPLH5Ocijk",
      authDomain: "aplikasi-sahabatkugroup.firebaseapp.com",
      databaseURL: "https://aplikasi-sahabatkugroup-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "aplikasi-sahabatkugroup",
      storageBucket: "aplikasi-sahabatkugroup.firebasestorage.app",
      messagingSenderId: "323288632862",
      appId: "1:323288632862:web:57f12fbb5b18ad0fbd680f",
      measurementId: "G-788RL05MFR"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let DATA_ONGKIR = {};

    // Load data ongkir
    onValue(ref(db, 'ongkir_wilayah'), (snap) => {
      DATA_ONGKIR = snap.val() || {};
    });

    // Theme toggle
    const themeToggle = document.getElementById('themeToggle');
    const savedTheme = localStorage.getItem('theme');
    const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    if (savedTheme === 'light') {
      document.documentElement.classList.remove('dark');
    } else if (savedTheme === 'dark') {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.toggle('dark', systemDark);
    }
    
    themeToggle.addEventListener('click', () => {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    window.switchTab = function(tab) {
      ['normal', 'jarak', '3arah'].forEach(t => {
        document.getElementById(`section-${t}`).classList.toggle('hidden', t !== tab);
        document.getElementById(`tab-${t}`).classList.toggle('bg-white', t === tab);
        document.getElementById(`tab-${t}`).classList.toggle('dark:bg-darkBg', t === tab);
        document.getElementById(`tab-${t}`).classList.toggle('text-sahabatku', t === tab);
        document.getElementById(`tab-${t}`).classList.toggle('shadow-sm', t === tab);
        document.getElementById(`tab-${t}`).classList.toggle('text-slate-500', t !== tab);
        document.getElementById(`tab-${t}`).classList.toggle('dark:text-slate-400', t !== tab);
      });
    };

    function normalizeNama(text) {
      return (text || '').toString().trim().toLowerCase().replace(/\s+/g, ' ');
    }

    function cariTarif(nama) {
      const target = normalizeNama(nama);
      for (let k in DATA_ONGKIR) {
        const item = DATA_ONGKIR[k];
        if (item && normalizeNama(item.wilayah) === target) {
          return parseInt(item.tarif) || 0;
        }
      }
      return 0;
    }

    window.updateSuggestions = function(mode, type) {
      const inputId = `${mode}-${type}`;
      const suggestId = `suggest-${mode}-${type}`;
      const input = document.getElementById(inputId);
      const box = document.getElementById(suggestId);
      if (!input || !box) return;

      const q = normalizeNama(input.value);
      if (!q) {
        box.classList.add('hidden');
        box.innerHTML = '';
        return;
      }

      const matches = [];
      for (let k in DATA_ONGKIR) {
        const item = DATA_ONGKIR[k];
        if (item && normalizeNama(item.wilayah).includes(q)) {
          matches.push(item.wilayah);
        }
      }

      if (!matches.length) {
        box.classList.add('hidden');
        box.innerHTML = '';
        return;
      }

      box.innerHTML = matches.slice(0, 8).map(nama => `
        <div onclick="pilihSuggestion('${mode}','${type}','${nama.replace(/'/g, "\\'")}')"
          class="px-4 py-2.5 text-xs cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors border-b border-slate-100 dark:border-slate-700 last:border-0">
          <i class="fa-solid fa-location-dot text-slate-400 mr-2"></i>${nama}
        </div>
      `).join('');

      box.classList.remove('hidden');
    };

    window.pilihSuggestion = function(mode, type, nama) {
      const inputId = `${mode}-${type}`;
      const suggestId = `suggest-${mode}-${type}`;
      const input = document.getElementById(inputId);
      const box = document.getElementById(suggestId);
      if (input) input.value = nama;
      if (box) {
        box.classList.add('hidden');
        box.innerHTML = '';
      }
    };

    window.hitungNormal = function() {
      const asal = document.getElementById('normal-asal').value.trim();
      const tujuan = document.getElementById('normal-tujuan').value.trim();

      if (!asal && !tujuan) {
        alert('Isi minimal salah satu: asal atau tujuan.');
        return;
      }

      const tarifAsal = asal ? cariTarif(asal) : 0;
      const tarifTujuan = tujuan ? cariTarif(tujuan) : 0;

      let hasil = 0;
      if (asal && tujuan) hasil = tarifAsal + tarifTujuan - 6000;
      else if (asal) hasil = tarifAsal;
      else hasil = tarifTujuan;

      hasil = Math.max(0, hasil);

      document.getElementById('display-normal').textContent = 'Rp ' + hasil.toLocaleString('id-ID');
      document.getElementById('result-normal').classList.remove('hidden');
    };
    window.hitungJarak = function() {
      const wilayah = document.getElementById('jarak-wilayah').value.trim();
      const km = parseFloat(document.getElementById('jarak-km').value) || 0;

      if (!wilayah || km <= 0) {
        alert('Isi wilayah dan jarak dengan benar.');
        return;
      }

      let hasil = 0;
      let info = '';

      if (km <= 12) {
        info = `<div class="text-[10px] text-amber-600 dark:text-amber-300">⚠️ Jarak ≤ 12km. Gunakan "Cek Ongkir" normal untuk hasil akurat.</div>`;
        const resultElement = document.getElementById('result-jarak');
        if (resultElement) {
          resultElement.innerHTML = `
            <div class="text-xs text-amber-600 dark:text-amber-300 uppercase font-bold">Informasi</div>
            ${info}
          `;
          resultElement.classList.remove('hidden');
        }
      } else {
        const tarifWilayah = cariTarif(wilayah);
        hasil = (km * 2000) + 5000 + tarifWilayah;
        
        const displayElement = document.getElementById('display-jarak');
        const resultElement = document.getElementById('result-jarak');
        
        if (displayElement) {
          displayElement.textContent = 'Rp ' + Math.round(hasil).toLocaleString('id-ID');
        }
        
        if (resultElement) {
          info = `<div class="text-[10px] text-indigo-600 dark:text-indigo-300 mt-2">Rumus: (${km} × 2000) + 5000 + ${tarifWilayah.toLocaleString('id-ID')} = <b>Rp ${Math.round(hasil).toLocaleString('id-ID')}</b></div>`;
          resultElement.innerHTML = `
            <div class="text-xs text-indigo-600 dark:text-indigo-300 uppercase font-bold">Hasil Hitung Jarak</div>
            <div class="text-3xl font-black text-indigo-700 dark:text-indigo-200 mt-2">Rp ${Math.round(hasil).toLocaleString('id-ID')}</div>
            ${info}
          `;
          resultElement.classList.remove('hidden');
        }
      }
    };


    window.hitung3Arah = function() {
      const asal = document.getElementById('3arah-asal').value.trim();
      const titik = document.getElementById('3arah-titik').value.trim();
      const tujuan = document.getElementById('3arah-tujuan').value.trim();

      if (!asal || !titik || !tujuan) {
        alert('Lengkapi semua kolom: asal, titik tengah, dan tujuan.');
        return;
      }

      const tarifAsal = cariTarif(asal);
      const tarifTitik = cariTarif(titik);
      const tarifTujuan = cariTarif(tujuan);

      const hasil = Math.max(0, tarifAsal + tarifTitik - 6000 + tarifTujuan);

      document.getElementById('display-3arah').textContent = 'Rp ' + hasil.toLocaleString('id-ID');
      document.getElementById('result-3arah').classList.remove('hidden');
    };

    // Click outside suggestions
    document.addEventListener('click', (e) => {
      if (!e.target.closest('input')) {
        document.querySelectorAll('[id^="suggest-"]').forEach(box => {
          box.classList.add('hidden');
          box.innerHTML = '';
        });
      }
    });
  </script>
</body>
</html>
